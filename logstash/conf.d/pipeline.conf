# =============================================================================
# Logstash Pipeline Configuration
# =============================================================================
#
# Logstash is the "transformation layer" — like dbt or Spark in Data Engineering.
# It has 3 sections:
#
#   input  { }  → WHERE data comes from (Filebeat, syslog, Kafka, etc.)
#   filter { }  → HOW to transform it (parse, enrich, rename, drop fields)
#   output { }  → WHERE to send it (Elasticsearch, file, stdout, etc.)
#
# Data flows: input → filter → output (like an ETL pipeline)

input {
  # Receive logs from Filebeat over the Beats protocol
  # Filebeat connects to this port and pushes log events
  beats {
    port => 5044
    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/config/certs/wildcard.local.flex.cert.pem"
    ssl_key => "/usr/share/logstash/config/certs/wildcard.local.flex.key.nopass.pem"
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca-chain.cert.pem"]
    ssl_client_authentication => "required"
  }
}

filter {
  # ── Remove Filebeat/agent wrapper fields we don't need ──────────────
  # Filebeat wraps our NDJSON events in extra metadata (agent, host, ecs, etc.)
  # We only want the original fields from our log files.
  mutate {
    remove_field => [
      "agent", "ecs", "host", "log", "input",
      "[event][original]", "metadata"
    ]
  }

  # ── Ensure attack fields have proper defaults ──────────────────────
  # Events from live capture (tshark) don't have attack fields.
  # Set defaults so all documents have a consistent schema.
  if ![attack_type] {
    mutate { add_field => { "attack_type" => "normal" } }
  }
  if ![attack_label] {
    mutate { add_field => { "attack_label" => "normal" } }
  }
  if ![capture_source] {
    mutate { add_field => { "capture_source" => "unknown" } }
  }
}

output {
  # Send everything to Elasticsearch
  elasticsearch {
    hosts => ["https://elasticsearch01.local:9200"]
    user => "elastic"
    password => "changeme"
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca-chain.cert.pem"]
    # Index name pattern — creates a new index per day
    # Like creating a new table partition each day in a data warehouse
    index => "iot-radar-%{+YYYY.MM.dd}"
  }

  # Also print to stdout for debugging (remove in production)
  stdout {
    codec => rubydebug
  }
}
